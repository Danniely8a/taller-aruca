services:
  - type: web
    name: taller-aruca
    env: python
    buildCommand: |
      cd frontend
      npm install
      npm run build
      cd ../backend
      pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taller-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.14.5

databases:
  - name: taller-db
    plan: free
    databaseName: taller_maquinas
